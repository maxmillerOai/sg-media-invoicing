name: Build desktop installers

# Builds the native installers in the cloud:
#   - macOS Apple Silicon → .dmg arm64
#   - macOS Intel         → .dmg x86_64
#   - Windows             → .msi
# Run it from the GitHub "Actions" tab or on push to main/master,
# then download installers from the run's "Artifacts" section.

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  macos-arm64-dmg:
    name: macOS Apple Silicon DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 36
        run: yes | sdkmanager "platforms;android-36" || true

      - name: Build macOS Apple Silicon DMG
        run: |
          chmod +x ./gradlew
          ./gradlew :desktopApp:packageDmg --no-daemon --no-configuration-cache --stacktrace

      - name: Smoke test macOS Apple Silicon app launch
        shell: bash
        run: |
          echo "Looking for .app bundle..."

          APP_PATH=$(find desktopApp/build/compose/binaries/main -name "*.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app bundle found"
            find desktopApp/build/compose/binaries/main -maxdepth 5 -type d || true
            exit 1
          fi

          echo "✅ Found app: $APP_PATH"

          EXECUTABLE=$(find "$APP_PATH/Contents/MacOS" -maxdepth 1 -type f | head -n 1)

          if [ -z "$EXECUTABLE" ]; then
            echo "❌ No executable found inside app bundle"
            ls -la "$APP_PATH/Contents/MacOS" || true
            exit 1
          fi

          chmod +x "$EXECUTABLE" || true

          echo "✅ Found executable: $EXECUTABLE"
          echo "Launching app..."

          "$EXECUTABLE" > app-launch.log 2>&1 &
          APP_PID=$!

          echo "App PID: $APP_PID"
          sleep 15

          if kill -0 "$APP_PID" 2>/dev/null; then
            echo "✅ macOS Apple Silicon app launched and stayed running for 15 seconds"
            kill "$APP_PID" || true
            exit 0
          else
            echo "❌ macOS Apple Silicon app crashed or closed immediately"
            echo "---- app-launch.log ----"
            cat app-launch.log || true
            exit 1
          fi

      - name: Verify macOS Apple Silicon DMG
        shell: bash
        run: |
          set -euo pipefail

          EXPECTED_ARCH="arm64"

          echo "========================================"
          echo "macOS Apple Silicon verification"
          echo "Expected arch: $EXPECTED_ARCH"
          echo "========================================"

          APP_PATH=$(find desktopApp/build/compose/binaries/main -name "*.app" -type d | head -n 1)
          DMG_PATH=$(find desktopApp/build/compose/binaries/main/dmg -name "*.dmg" -type f | head -n 1 || true)

          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app bundle found"
            exit 1
          fi

          echo "✅ Found app: $APP_PATH"

          echo ""
          echo "========================================"
          echo "App bundle contents inspection"
          echo "========================================"

          echo ""
          echo "App bundle contents:"
          find "$APP_PATH/Contents" -maxdepth 4 -type d -print || true

          echo ""
          echo "All files that look like Java/runtime files:"
          find "$APP_PATH/Contents" -maxdepth 8 \( -name "java" -o -name "runtime" -o -name "jre" -o -name "jdk" -o -name "Home" -o -name "libjli.dylib" -o -name "libjvm.dylib" \) -print || true

          echo ""
          echo "Top-level Contents folder:"
          ls -la "$APP_PATH/Contents" || true

          echo ""
          echo "Resources folder:"
          ls -la "$APP_PATH/Contents/Resources" || true

          EXECUTABLE=$(find "$APP_PATH/Contents/MacOS" -maxdepth 1 -type f | head -n 1)
          INFO_PLIST="$APP_PATH/Contents/Info.plist"

          if [ -z "$EXECUTABLE" ]; then
            echo "❌ No executable found"
            exit 1
          fi

          echo ""
          echo "1. Main executable architecture"
          echo "----------------------------------------"
          echo "Executable: $EXECUTABLE"
          file "$EXECUTABLE" || true

          MAIN_ARCHS=$(lipo -archs "$EXECUTABLE" 2>/dev/null || true)
          echo "Detected main executable archs: $MAIN_ARCHS"

          if echo "$MAIN_ARCHS" | grep -q "$EXPECTED_ARCH"; then
            echo "✅ Main executable contains expected arch: $EXPECTED_ARCH"
          else
            echo "❌ Main executable does not contain expected arch: $EXPECTED_ARCH"
            exit 1
          fi

          echo ""
          echo "2. Bundled Java runtime architecture"
          echo "----------------------------------------"

          JAVA_BIN=$(find "$APP_PATH/Contents" -path "*/bin/java" -type f | head -n 1 || true)

          if [ -z "$JAVA_BIN" ]; then
            echo "⚠️ No bundled Java runtime found inside app"
          else
            echo "Java binary: $JAVA_BIN"
            file "$JAVA_BIN" || true

            JAVA_ARCHS=$(lipo -archs "$JAVA_BIN" 2>/dev/null || true)
            echo "Detected Java runtime archs: $JAVA_ARCHS"

            if echo "$JAVA_ARCHS" | grep -q "$EXPECTED_ARCH"; then
              echo "✅ Bundled Java runtime contains expected arch: $EXPECTED_ARCH"
            else
              echo "❌ Bundled Java runtime does not contain expected arch: $EXPECTED_ARCH"
              exit 1
            fi
          fi

          echo ""
          echo "3. Info.plist"
          echo "----------------------------------------"

          if [ ! -f "$INFO_PLIST" ]; then
            echo "❌ Info.plist not found"
            exit 1
          fi

          echo "Info.plist: $INFO_PLIST"

          echo "CFBundleName:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleName" "$INFO_PLIST" || true

          echo "CFBundleIdentifier:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$INFO_PLIST" || true

          echo "CFBundleShortVersionString:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$INFO_PLIST" || true

          echo "CFBundleVersion:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$INFO_PLIST" || true

          MIN_MACOS=$(/usr/libexec/PlistBuddy -c "Print :LSMinimumSystemVersion" "$INFO_PLIST" 2>/dev/null || true)

          if [ -z "$MIN_MACOS" ]; then
            echo "⚠️ LSMinimumSystemVersion not found"
          else
            echo "✅ Minimum macOS version: $MIN_MACOS"
          fi

          COPYRIGHT=$(/usr/libexec/PlistBuddy -c "Print :NSHumanReadableCopyright" "$INFO_PLIST" 2>/dev/null || true)

          if echo "$COPYRIGHT" | grep -q "GHN-TECH"; then
            echo "✅ Copyright includes GHN-TECH: $COPYRIGHT"
          else
            echo "❌ Copyright does not include GHN-TECH"
            echo "Copyright: $COPYRIGHT"
            exit 1
          fi

          echo ""
          echo "4. Icon resources"
          echo "----------------------------------------"

          echo "CFBundleIconFile:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconFile" "$INFO_PLIST" || true

          echo "Icon files in Resources:"
          find "$APP_PATH/Contents/Resources" -maxdepth 2 \( -name "*.icns" -o -name "*.png" -o -name "*.ico" \) -print || true

          if find "$APP_PATH/Contents/Resources" -maxdepth 2 -name "*.icns" | grep -q .; then
            echo "✅ .icns icon found in built app"
          else
            echo "❌ No .icns icon found in built app"
            exit 1
          fi

          echo ""
          echo "5. DMG"
          echo "----------------------------------------"

          if [ -z "$DMG_PATH" ]; then
            echo "❌ No DMG found"
            exit 1
          fi

          echo "✅ DMG found: $DMG_PATH"
          file "$DMG_PATH" || true
          ls -lh "$DMG_PATH" || true

          echo ""
          echo "✅ macOS Apple Silicon verification completed"

      - name: Rename Apple Silicon DMG
        shell: bash
        run: |
          mkdir -p desktopApp/build/compose/binaries/main/dmg-arm64
          DMG_PATH=$(find desktopApp/build/compose/binaries/main/dmg -name "*.dmg" -type f | head -n 1)
          cp "$DMG_PATH" "desktopApp/build/compose/binaries/main/dmg-arm64/SG-Media-Invoicing-macOS-arm64.dmg"

      - name: Upload Apple Silicon DMG
        uses: actions/upload-artifact@v4
        with:
          name: SG-Media-Invoicing-macOS-arm64
          path: desktopApp/build/compose/binaries/main/dmg-arm64/*.dmg
          if-no-files-found: error

